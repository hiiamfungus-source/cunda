version: "3.7"

services:
  app:
    image: wealthfolio/wealthfolio:latest
    container_name: wealthfolio
    restart: unless-stopped
    ports:
      - "8088:8088"
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      WF_LISTEN_ADDR: "0.0.0.0:8088"
      WF_DB_PATH: "/data/wealthfolio.db"
      WF_CORS_ALLOW_ORIGINS: "http://localhost:8088"
      # Generiamo valori di default sicuri al primo avvio
      WF_SECRET_KEY: "${WF_SECRET_KEY:-}"
      WF_AUTH_PASSWORD_HASH: "${WF_AUTH_PASSWORD_HASH:-}"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s   # dà più tempo all'app di partire

  app_proxy:
    environment:
      APP_HOST: app
      APP_PORT: 8088
