version: "3.7"

services:
  app: # CRITICO: Deve chiamarsi 'app' per il proxy di Umbrel
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: cunda-wealthfolio
    expose: # CRITICO: Usa expose, non ports
      - "8088"
    volumes:
      - ${APP_DATA_DIR}/data:/app/data
    networks:
      - umbrel_mainnet # CRITICO: Rete per farsi trovare dal proxy

networks:
  umbrel_mainnet:
    external: true
