version: "3.7"

services:
  app:
    image: wealthfolio/wealthfolio:latest
    container_name: wealthfolio
    restart: unless-stopped
    ports:
      - "8088:8088"
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      WF_LISTEN_ADDR: "0.0.0.0:8088"
      WF_DB_PATH: "/data/wealthfolio.db"
      # === CONSIGLIATE PER SICUREZZA ===
      # WF_SECRET_KEY: "cambia-questa-chiave-lunga-e-casuale"
      # WF_AUTH_PASSWORD_HASH: "hash-argon2-che-ti-do-dopo"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8088"]
      interval: 30s
      timeout: 10s
      retries: 3

  app_proxy:
    environment:
      APP_HOST: app
      APP_PORT: 8088
